<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Altair Certified School">
  <defs>
    <radialGradient id="cBg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e2a5e"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </radialGradient>
    <filter id="cGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#4a6cf7" stroke-width="2.5" opacity="0.7"/>
  <!-- Inner fill -->
  <circle cx="60" cy="60" r="52" fill="url(#cBg)"/>
  <!-- Tick mark -->
  <path d="M38 60 L52 74 L82 44" fill="none" stroke="#4a6cf7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cGlow)"/>
  <!-- Label -->
  <text x="60" y="96" text-anchor="middle" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.08em" fill="#8890c0" text-transform="uppercase">CERTIFIED</text>
</svg>
